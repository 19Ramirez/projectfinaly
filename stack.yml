version: '3.8'

services:
  app:
    image: ghcr.io/19ramirez/projectfinaly/docker-project:1.0.0
    networks:
      - traefik-public
    environment:
      - DB_HOST=db
      - DB_NAME=taller_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
    volumes:
      - app_images_prod:/app/static/uploads
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ramirez-app.entrypoints=http"
        - "traefik.http.routers.ramirez-app.rule=Host(`fd.byronrm.com`)"
        - "traefik.http.middlewares.ramirez-app-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.ramirez-app.middlewares=ramirez-app-redirect"
        - "traefik.http.routers.ramirez-app-secure.entrypoints=https"
        - "traefik.http.routers.ramirez-app-secure.rule=Host(`fd.byronrm.com`) || Host(`backfd.byronrm.com`)"
        - "traefik.http.routers.ramirez-app-secure.tls=true"
        - "traefik.http.routers.ramirez-app-secure.tls.certresolver=http"
        - "traefik.http.services.ramirez-app-service.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

  db:
    image: postgres:15-alpine
    networks:
      - traefik-public
    environment:
      - POSTGRES_DB=taller_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  adminer:
    image: adminer:latest
    networks:
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ramirez-adminer.entrypoints=http"
        - "traefik.http.routers.ramirez-adminer.rule=Host(`pgfd.byronrm.com`)"
        - "traefik.http.routers.ramirez-adminer-secure.entrypoints=https"
        - "traefik.http.routers.ramirez-adminer-secure.rule=Host(`pgfd.byronrm.com`)"
        - "traefik.http.routers.ramirez-adminer-secure.tls=true"
        - "traefik.http.routers.ramirez-adminer-secure.tls.certresolver=http"
        - "traefik.http.services.ramirez-adminer-service.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

  portainer:
    image: portainer/portainer-ce:latest
    networks:
      - traefik-public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ramirez-portainer.entrypoints=http"
        - "traefik.http.routers.ramirez-portainer.rule=Host(`portainerfd.byronrm.com`)"
        - "traefik.http.routers.ramirez-portainer-secure.entrypoints=https"
        - "traefik.http.routers.ramirez-portainer-secure.rule=Host(`portainerfd.byronrm.com`)"
        - "traefik.http.routers.ramirez-portainer-secure.tls=true"
        - "traefik.http.routers.ramirez-portainer-secure.tls.certresolver=http"
        - "traefik.http.services.ramirez-portainer-service.loadbalancer.server.port=9000"
        - "traefik.docker.network=traefik-public"

volumes:
  pgdata:
  portainer_data:
  app_images_prod:

networks:
  traefik-public:
    external: true